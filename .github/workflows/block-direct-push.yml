name: 🚫 Bloquer les pushs directs vers main

# Ce workflow se déclenche si quelqu'un pousse directement sur main.
# La protection principale est assurée par les règles de protection de branche GitHub (configurées dans Paramètres).
# Ce workflow constitue une deuxième couche de défense et un journal d'audit.

on:
  push:
    branches:
      - main

jobs:
  audit-push-direct:
    name: Audit d'un push direct vers main
    runs-on: ubuntu-latest

    steps:
      - name: Détection d'un contournement
        run: |
          echo "──────────────────────────────────────────────────"
          echo "⚠️  AVERTISSEMENT : Push direct détecté sur la branche 'main'"
          echo "──────────────────────────────────────────────────"
          echo "Auteur du push  : ${{ github.actor }}"
          echo "SHA du commit   : ${{ github.sha }}"
          echo "Référence       : ${{ github.ref }}"
          echo ""
          echo "Ce push a contourné le processus de protection code → main."
          echo "Veuillez vérifier ce commit et vous assurer qu'il est passé"
          echo "par la branche d'intégration 'code' avant d'atteindre main."
          echo "──────────────────────────────────────────────────"
