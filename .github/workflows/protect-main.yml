name: 🔒 Protéger la branche principale (main)

# Ce workflow s'exécute sur chaque Pull Request ciblant `main`.
# Règles appliquées :
#   1. Seule la branche `code` peut être fusionnée dans `main`.
#   2. La PR doit avoir au moins MIN_REVUES approbations.

on:
  pull_request:
    branches:
      - main
  pull_request_review:
    types: [submitted, dismissed]

env:
  # ✏️ Passez cette valeur à 2 si vous souhaitez deux approbations requises
  MIN_REVUES: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # TÂCHE 1 - Vérifier que la branche source est bien `code`
  # ─────────────────────────────────────────────────────────────
  verifier-branche-source:
    name: Seule la branche `code` peut fusionner dans `main`
    runs-on: ubuntu-latest

    steps:
      - name: Vérification de la branche source
        run: |
          SOURCE="${{ github.head_ref }}"
          echo "Branche source de la PR : $SOURCE"
          if [ "$SOURCE" != "code" ]; then
            echo "──────────────────────────────────────────────────────"
            echo "❌ FUSION BLOQUÉE — mauvaise branche source"
            echo "──────────────────────────────────────────────────────"
            echo "Seule la branche 'code' est autorisée à fusionner dans 'main'."
            echo "Vous avez tenté de fusionner depuis : '$SOURCE'"
            echo ""
            echo "Processus correct :"
            echo "  1. Fusionnez votre branche de travail dans 'code'"
            echo "  2. Corrigez les erreurs éventuelles dans 'code'"
            echo "  3. Ouvrez une PR depuis 'code' → 'main'"
            echo "──────────────────────────────────────────────────────"
            exit 1
          else
            echo "✅ La branche source est 'code'. Passage à la vérification des approbations."
          fi

  # ─────────────────────────────────────────────────────────────
  # TÂCHE 2 - Exiger au moins MIN_REVUES approbations
  # ─────────────────────────────────────────────────────────────
  verifier-approbations:
    name: Vérifier le nombre minimum d'approbations avant la fusion dans main
    runs-on: ubuntu-latest
    needs: verifier-branche-source   # ne s'exécute que si la tâche 1 réussit

    steps:
      - name: Compter les approbations reçues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMERO_PR: ${{ github.event.pull_request.number }}
          DEPOT: ${{ github.repository }}
        run: |
          echo "Récupération des révisions pour la PR #$NUMERO_PR dans $DEPOT ..."

          APPROUVE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$DEPOT/pulls/$NUMERO_PR/reviews" \
            | python3 -c "
          import sys, json
          revisions = json.load(sys.stdin)
          # Conserver uniquement la dernière révision par utilisateur, compter les APPROVED
          derniere = {}
          for r in revisions:
              derniere[r['user']['login']] = r['state']
          approuve = sum(1 for s in derniere.values() if s == 'APPROVED')
          print(approuve)
          ")

          echo "──────────────────────────────────────────────────────"
          echo "Approbations reçues   : $APPROUVE"
          echo "Minimum requis        : $MIN_REVUES"
          echo "──────────────────────────────────────────────────────"

          if [ "$APPROUVE" -lt "$MIN_REVUES" ]; then
            echo "❌ FUSION BLOQUÉE — pas assez d'approbations."
            echo "   Cette PR nécessite au moins $MIN_REVUES approbation(s) pour fusionner dans main."
            exit 1
          else
            echo "✅ Condition d'approbation remplie ($APPROUVE/$MIN_REVUES). Fusion autorisée."
          fi
