name: ✅ Valider la branche code

# Ce workflow s'exécute sur chaque Pull Request ciblant `code`.
# Les branches de travail doivent passer ces vérifications avant de pouvoir être fusionnées dans `code`.

on:
  pull_request:
    branches:
      - code

jobs:
  valider-branche-travail:
    name: Validation de la branche de travail entrante
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ Aucun fichier requirements.txt trouvé. Installation des dépendances ignorée."
          fi

      - name: Exécution des tests
        run: |
          if [ -d tests ]; then
            echo "🧪 Lancement des tests..."
            python -m pytest tests/ -v
          else
            echo "⚠️ Aucun dossier tests/ trouvé. Tests ignorés."
          fi

      - name: Vérification du style de code (flake8)
        run: |
          pip install flake8 --quiet
          echo "🔍 Vérification du style de code..."
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Vérification du nom de la branche
        run: |
          SOURCE="${{ github.head_ref }}"
          echo "Branche de travail tentant la fusion : $SOURCE"
          if [ "$SOURCE" = "main" ]; then
            echo "❌ La branche 'main' ne peut pas être fusionnée directement dans 'code'."
            exit 1
          fi
          echo "✅ La branche '$SOURCE' est autorisée à fusionner dans 'code'."
