name: ✅ Valider la branche code

# Ce workflow s'exécute sur chaque Pull Request ciblant `code`.
# Les branches de travail doivent passer ces vérifications avant de pouvoir être fusionnées dans `code`.

on:
  pull_request:
    branches:
      - code

jobs:
  valider-branche-travail:
    name: Validation de la branche de travail entrante
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour comparer l'historique des branches

      - name: Vérifier que la branche est à jour avec 'code'
        run: |
          BRANCHE_CIBLE="${{ github.base_ref }}" # devrait être 'code'
          BRANCHE_SOURCE="${{ github.head_ref }}"
          
          echo "Vérification de la mise à jour de $BRANCHE_SOURCE par rapport à $BRANCHE_CIBLE"
          
          # Récupérer les informations les plus récentes des deux branches
          git fetch origin $BRANCHE_CIBLE
          git fetch origin $BRANCHE_SOURCE
          
          # Vérifier si la branche cible est incluse dans la branche source
          # (si oui, la branche de travail est à jour)
          if ! git merge-base --is-ancestor origin/$BRANCHE_CIBLE origin/$BRANCHE_SOURCE; then
            echo "──────────────────────────────────────────────────────"
            echo "❌ FUSION BLOQUÉE : Votre branche n'est pas à jour !"
            echo "──────────────────────────────────────────────────────"
            echo "La branche '$BRANCHE_CIBLE' contient des modifications que vous n'avez pas."
            echo "Pour résoudre ce problème, mettez à jour votre branche localement :"
            echo "  git fetch origin"
            echo "  git pull origin $BRANCHE_CIBLE"
            echo "Puis poussez vos modifications avant de réessayer de fusionner."
            echo "──────────────────────────────────────────────────────"
            exit 1
          else
            echo "✅ La branche est à jour avec '$BRANCHE_CIBLE'."
          fi

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ Aucun fichier requirements.txt trouvé. Installation des dépendances ignorée."
          fi

      - name: Exécution des tests
        run: |
          if [ -d tests ]; then
            echo "Lancement des tests..."
            # On exécute pytest et on capture son code de sortie
            python -m pytest tests/ -v || RC=$?
            
            # Pytest retourne 5 s'il ne trouve aucun test. On l'autorise.
            if [ "${RC:-0}" -eq 5 ]; then
              echo "✅ Aucun test détecté par pytest (code 5). La fusion n'est pas bloquée."
            elif [ "${RC:-0}" -ne 0 ]; then
              echo "❌ Des tests ont échoué !"
              exit $RC
            else
              echo "✅ Tous les tests ont réussi !"
            fi
          else
            echo "⚠️ Aucun dossier tests/ trouvé. Tests ignorés, fusion non bloquée."
          fi

      - name: Vérification du nom de la branche
        run: |
          SOURCE="${{ github.head_ref }}"
          echo "Branche de travail tentant la fusion : $SOURCE"
          if [ "$SOURCE" = "main" ]; then
            echo "❌ La branche 'main' ne peut pas être fusionnée directement dans 'code'."
            exit 1
          fi
          echo "✅ La branche '$SOURCE' est autorisée à fusionner dans 'code'."
